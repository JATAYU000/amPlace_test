name: PR Check and Merge

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: write
  contents: write

jobs:
  audit-and-merge:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check if the PR is from a fork
      - name: Check if PR is from a fork
        id: pr_source
        run: |
          if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "PR is from a fork."
            echo "::set-output name=is_fork::true"
          else
            echo "PR is not from a fork."
            echo "::set-output name=is_fork::false"
          fi

      # Step 2: Checkout base branch (target branch)
      - name: Checkout base branch
        uses: actions/checkout@v2
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      # Step 3: Get the list of changed files using GitHub API
      - name: Get the changed files
        id: changes
        run: |
          echo "Fetching changed files from GitHub API..."
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          echo "Fetching files changed in PR #$PR_NUMBER"
          
          # Call the GitHub API to get the list of changed files
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/files" \
               | jq -r '.[].filename' > changes.txt

          echo "Changed files:"
          cat changes.txt

      # Step 4: Validate that only 'pixel_update.json' was modified
      - name: Validate pixel_update.json
        run: |
          CHANGED_FILES=$(cat changes.txt)
          TOTAL_FILES=$(echo "$CHANGED_FILES" | wc -l)

          # Check if only 'pixel_update.json' was modified
          if [[ "$TOTAL_FILES" -eq 1 ]] && [[ "$CHANGED_FILES" == "pixel_update.json" ]]; then
            echo "Only pixel_update.json was modified. Proceeding with validation..."
          else
            echo "Error: Changes found in files other than pixel_update.json. Failing the PR."
            exit 1
          fi

      # Step 5: Save the content of changed file (pixel_update.json)
      - name: Save the content of changed file
        run: |
          cat pixel_update.json > changed_file_content.txt

      # Step 6: Get the PR author username
      - name: Get the PR author username
        id: pr_user
        run: |
          PR_USER=${{ github.event.pull_request.user.login }}
          echo "The PR was created by $PR_USER"
          echo "::set-output name=pr_user::$PR_USER"

      # Step 7: Perform Python validation
      - name: Pass the diff and file content to Python validation
        run: |
          python validate_pixel_update.py changes.txt changed_file_content.txt ${{ steps.pr_user.outputs.pr_user }}

      # Step 8: Create a new branch and merge the PR using the GitHub API
      - name: Create and merge the branch
        run: |
          REPO=${{ github.repository }}
          PR_NUMBER=${{ github.event.pull_request.number }}
          BRANCH_NAME=${{ steps.pr_user.outputs.pr_user }}
          COUNT=1

          # Check if a branch with the username already exists using GitHub API
          while curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${REPO}/git/refs/heads/$BRANCH_NAME" | grep -q 'ref'; do
            COUNT=$((COUNT+1))
            BRANCH_NAME="${{ steps.pr_user.outputs.pr_user }}${COUNT}"
          done

          # Create a new branch from the base branch
          BASE_BRANCH=${{ github.event.pull_request.base.ref }}
          BASE_COMMIT_SHA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${REPO}/git/refs/heads/${BASE_BRANCH}" | jq -r '.object.sha')

          # Create the new branch in the repo
          curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -d "{\"ref\": \"refs/heads/${BRANCH_NAME}\", \"sha\": \"${BASE_COMMIT_SHA}\"}" \
            "https://api.github.com/repos/${REPO}/git/refs"

          # Fetch the PR branch from the fork to merge
          FORK_REPO=${{ github.event.pull_request.head.repo.full_name }}
          PR_BRANCH=${{ github.event.pull_request.head.ref }}
          
          # Get the SHA of the PR branch
          PR_COMMIT_SHA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${FORK_REPO}/commits/${PR_BRANCH}" | jq -r '.sha')

          # Create a merge commit on the new branch
          curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -d "{\"base\":\"${BRANCH_NAME}\", \"head\":\"${FORK_REPO}:${PR_BRANCH}\"}" \
            "https://api.github.com/repos/${REPO}/merges"

      # Step 9: Push the new branch to the repository
      - name: Push the new branch to the repository
        run: |
          BRANCH_NAME=${{ steps.pr_user.outputs.pr_user }}
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} "$BRANCH_NAME"
